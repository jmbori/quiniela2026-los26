<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Quiniela del Mundial</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.4.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #efefec;
    --text: #1a1a18; --text2: #6b6b67; --text3: #9b9b97;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --danger-bg: #FCEBEB; --danger-text: #A32D2D;
    --radius-md: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #262624; --bg3: #303030;
      --text: #f0f0ee; --text2: #a0a09c; --text3: #686864;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --danger-bg: #3a1a1a; --danger-text: #f09595;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
  .app { max-width: 960px; margin: 0 auto; padding: 2rem 1rem; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; flex-wrap: wrap; gap: 8px; }
  h1 { font-size: 22px; font-weight: 500; }
  .subtitle { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; }
  .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 1.5rem; }
  .stat { background: var(--bg2); border-radius: var(--radius-md); padding: .75rem 1rem; }
  .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 2px; }
  .stat-value { font-size: 22px; font-weight: 500; }
  .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .section-title { font-size: 12px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; }
  .refresh-btn { font-size: 12px; padding: 5px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius-md); background: transparent; cursor: pointer; color: var(--text2); display: flex; align-items: center; gap: 5px; }
  .refresh-btn:hover { background: var(--bg2); }
  .refresh-btn.loading i { animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .champion-banner { background: #FAC775; border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.5rem; display: none; align-items: center; gap: 10px; }
  .champion-banner.show { display: flex; }
  .champion-banner .big { font-size: 20px; font-weight: 500; color: #412402; }
  .champion-banner .sub { font-size: 13px; color: #633806; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; transition: opacity .2s; }
  .card.eliminated-all { opacity: .4; }
  .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 500; font-size: 13px; flex-shrink: 0; }
  .pname { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .alive-count { font-size: 12px; color: var(--text2); }
  .teams { display: flex; flex-direction: column; gap: 5px; }
  .team-row { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: var(--radius-md); background: var(--bg2); }
  .team-row.out { opacity: .4; text-decoration: line-through; }
  .team-row.out .flag { filter: grayscale(1); }
  .flag { font-size: 16px; width: 22px; text-align: center; }
  .tname { font-size: 13px; flex: 1; }
  .eliminated-label { font-size: 11px; padding: 2px 8px; border-radius: var(--radius-md); background: var(--danger-bg); color: var(--danger-text); margin-left: auto; white-space: nowrap; }
  .tip { font-size: 12px; color: var(--text3); margin-top: 1rem; }
  .last-update { font-size: 12px; color: var(--text3); }
  .error-msg { font-size: 13px; color: var(--danger-text); background: var(--danger-bg); padding: 10px 14px; border-radius: var(--radius-md); margin-bottom: 1rem; display: none; }
  .skeleton { background: var(--bg2); border-radius: var(--radius-lg); height: 180px; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🏆 Quiniela del Mundial</h1>
    <span class="last-update" id="last-update"></span>
  </div>
  <p class="subtitle">Estado en tiempo real. Los eliminados se actualizan desde el administrador.</p>

  <div id="champion-banner" class="champion-banner">
    <i class="ti ti-trophy" style="font-size:28px;color:#633806"></i>
    <div>
      <div class="big" id="champion-text"></div>
      <div class="sub" id="champion-team"></div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-label">Participantes</div><div class="stat-value">10</div></div>
    <div class="stat"><div class="stat-label">Equipos activos</div><div class="stat-value" id="stat-alive">-</div></div>
    <div class="stat"><div class="stat-label">Eliminados</div><div class="stat-value" id="stat-out">-</div></div>
  </div>

  <div class="toolbar">
    <span class="section-title">Participantes</span>
    <button class="refresh-btn" id="refresh-btn" onclick="fetchData()">
      <i class="ti ti-refresh"></i> Actualizar
    </button>
  </div>

  <div id="error-msg" class="error-msg">No se pudo cargar el estado. Intenta actualizar.</div>
  <div class="grid" id="grid">
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
  </div>
  <p class="tip"><i class="ti ti-refresh"></i> Se actualiza automáticamente cada 60 segundos.</p>
</div>

<script>
const SHEET_ID = '1f5GPsvZ1qbSH9RoA9jmceHscay-Bmqb8ro-x3adVOEQ';
const API_KEY = 'AIzaSyCr5Hc3RCA1rGEk2n4eAk-g1twfPRcFGIU';

const COLORS = [
  {bg:'#E6F1FB',text:'#0C447C'},{bg:'#EAF3DE',text:'#3B6D11'},{bg:'#FAEEDA',text:'#854F0B'},
  {bg:'#FBEAF0',text:'#993556'},{bg:'#EEEDFE',text:'#3C3489'},{bg:'#E1F5EE',text:'#085041'},
  {bg:'#FAECE7',text:'#993C1D'},{bg:'#FFF3CD',text:'#7A4000'},{bg:'#F1EFE8',text:'#5F5E5A'},
  {bg:'#E8F5E9',text:'#1B5E20'}
];

const FLAGS = {
  'España':'🇪🇸','Ecuador':'🇪🇨','Noruega':'🇳🇴','Bosnia y Herzegovina':'🇧🇦',
  'Francia':'🇫🇷','Austria':'🇦🇹','Suecia':'🇸🇪','Panamá':'🇵🇦',
  'Argentina':'🇦🇷','Senegal':'🇸🇳','Turquía':'🇹🇷','Sudáfrica':'🇿🇦','Uzbekistán':'🇺🇿',
  'Inglaterra':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Japón':'🇯🇵','Corea del Sur':'🇰🇷','Arabia Saudita':'🇸🇦','Iraq':'🇮🇶',
  'Portugal':'🇵🇹','Estados Unidos':'🇺🇸','Chequia':'🇨🇿','Qatar':'🇶🇦','Jordania':'🇯🇴',
  'Brasil':'🇧🇷','México':'🇲🇽','Argelia':'🇩🇿','Australia':'🇦🇺','Cabo Verde':'🇨🇻',
  'Alemania':'🇩🇪','Suiza':'🇨🇭','Paraguay':'🇵🇾','Ghana':'🇬🇭','Haití':'🇭🇹',
  'Países Bajos':'🇳🇱','Marruecos':'🇲🇦','Costa de Marfil':'🇨🇮','Túnez':'🇹🇳','Nueva Zelanda':'🇳🇿',
  'Uruguay':'🇺🇾','Colombia':'🇨🇴','Escocia':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','Irán':'🇮🇷','Curazao':'🇨🇼',
  'Bélgica':'🇧🇪','Croacia':'🇭🇷','Canadá':'🇨🇦','Egipto':'🇪🇬','Congo DR':'🇨🇩'
};

const PARTICIPANTES = [
  {name:'David Eduardo Martinez Pulido', teams:['España','Ecuador','Noruega','Bosnia y Herzegovina']},
  {name:'Jesús Peña',                   teams:['Francia','Austria','Suecia','Panamá']},
  {name:'Arturo Aponte',                teams:['Argentina','Senegal','Turquía','Sudáfrica','Uzbekistán']},
  {name:'Víctor Manuel Calderón',       teams:['Inglaterra','Japón','Corea del Sur','Arabia Saudita','Iraq']},
  {name:'Jorge Ibarrola',               teams:['Portugal','Estados Unidos','Chequia','Qatar','Jordania']},
  {name:'Diego Mendoza',                teams:['Brasil','México','Argelia','Australia','Cabo Verde']},
  {name:'Rafael Hernández',             teams:['Alemania','Suiza','Paraguay','Ghana','Haití']},
  {name:'Juan Manuel Bori',             teams:['Países Bajos','Marruecos','Costa de Marfil','Túnez','Nueva Zelanda']},
  {name:'Sergio Sánchez Naranjo',       teams:['Uruguay','Colombia','Escocia','Irán','Curazao']},
  {name:'José Antonio Reyes',           teams:['Bélgica','Croacia','Canadá','Egipto','Congo DR']}
];

function getInitials(n){ return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }

function parseSheetData(data){
  const rows = data.values || [];
  const result = {};
  rows.slice(1).forEach(row => {
    const equipo = (row[0] || '').trim();
    const eliminado = (row[1] || '0').trim();
    if(equipo) result[equipo] = eliminado === '1';
  });
  return result;
}

function render(eliminated){
  const grid = document.getElementById('grid');
  let totalAlive = 0, totalOut = 0;
  const html = PARTICIPANTES.map((p, i) => {
    const alive = p.teams.filter(t => !eliminated[t]);
    const allOut = alive.length === 0;
    totalAlive += alive.length;
    totalOut += p.teams.length - alive.length;
    const c = COLORS[i % COLORS.length];
    const teamsHtml = p.teams.map(t => {
      const out = !!eliminated[t];
      return `<div class="team-row${out ? ' out' : ''}">
        <span class="flag">${FLAGS[t] || '🏳️'}</span>
        <span class="tname">${t}</span>
      </div>`;
    }).join('');
    const badge = allOut ? '<span class="eliminated-label">Eliminado</span>' : '';
    return `<div class="card${allOut ? ' eliminated-all' : ''}">
      <div class="card-header">
        <div class="avatar" style="background:${c.bg};color:${c.text}">${getInitials(p.name)}</div>
        <div style="flex:1;min-width:0">
          <div class="pname">${p.name}</div>
          <div class="alive-count">${alive.length}/${p.teams.length} equipos activos</div>
        </div>${badge}
      </div>
      <div class="teams">${teamsHtml}</div>
    </div>`;
  }).join('');
  grid.innerHTML = html;
  document.getElementById('stat-alive').textContent = totalAlive;
  document.getElementById('stat-out').textContent = totalOut;
  const active = PARTICIPANTES.filter(p => p.teams.some(t => !eliminated[t]));
  const banner = document.getElementById('champion-banner');
  if(active.length === 1){
    const w = active[0];
    const lastTeam = w.teams.find(t => !eliminated[t]);
    document.getElementById('champion-text').textContent = '¡Ganador: ' + w.name + '!';
    document.getElementById('champion-team').textContent = 'Campeón con: ' + (lastTeam || 'último equipo');
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}

// Usa JSONP para evitar CORS completamente
function fetchData(){
  const btn = document.getElementById('refresh-btn');
  const err = document.getElementById('error-msg');
  btn.classList.add('loading');
  err.style.display = 'none';

  // Limpia callback anterior
  if(window._sheetCallback) delete window._sheetCallback;
  const old = document.getElementById('_sheet_script');
  if(old) old.remove();

  const callbackName = '_sheetCallback';
  window[callbackName] = function(data){
    try {
      const eliminated = parseSheetData(data);
      render(eliminated);
      const now = new Date();
      document.getElementById('last-update').textContent =
        'Actualizado ' + now.toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit'});
    } catch(e) {
      err.style.display = 'block';
    } finally {
      btn.classList.remove('loading');
      delete window[callbackName];
    }
  };

  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/A:B?key=${API_KEY}&alt=json-in-script&callback=${callbackName}`;
  const script = document.createElement('script');
  script.id = '_sheet_script';
  script.src = url;
  script.onerror = function(){
    err.style.display = 'block';
    btn.classList.remove('loading');
  };
  document.head.appendChild(script);
}

fetchData();
setInterval(fetchData, 60000);
</script>
</body>
</html>
